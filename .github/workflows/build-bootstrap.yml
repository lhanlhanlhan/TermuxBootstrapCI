name: Build Termux Bootstrap

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: '自定义包名 (e.g. com.mytermux)'
        required: false
        default: 'com.mytermux'
      packages:
        description: '额外软件包（逗号分隔, e.g. vim,curl,openssh）。留空 = 仅 bootstrap 基础包集'
        required: false
        default: ''
      termux_packages_ref:
        description: 'termux-packages 分支或 tag'
        required: false
        default: 'master'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      PACKAGE_NAME: ${{ inputs.package_name || 'com.mytermux' }}
      EXTRA_PACKAGES: ${{ inputs.packages || '' }}
      TERMUX_PACKAGES_REF: ${{ inputs.termux_packages_ref || 'master' }}
      TARGET_ARCH: 'aarch64'

    steps:
      # ============================================================
      #  Phase 1: 系统准备
      # ============================================================
      - name: "🧹 释放磁盘空间"
        run: |
          echo "==> 清理前:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/share/swift \
            /usr/local/graalvm \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/julia* \
            /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          docker image prune -af || true
          echo "==> 清理后:"
          df -h /

      - name: "📥 克隆 termux-packages"
        run: |
          git clone --depth=1 --branch="${TERMUX_PACKAGES_REF}" \
            https://github.com/termux/termux-packages.git
          echo "==> 克隆完成 (ref: ${TERMUX_PACKAGES_REF})"

      - name: "🔍 检查仓库结构"
        run: |
          echo "==> 关键文件:"
          for f in scripts/run-docker.sh scripts/properties.sh build-package.sh; do
            [ -f "termux-packages/$f" ] && echo "  ✅ $f" || { echo "  ❌ $f 不存在！"; exit 1; }
          done
          echo ""
          echo "==> Bootstrap 脚本探测:"
          for f in scripts/generate-bootstraps.sh scripts/build-bootstrap.sh; do
            [ -f "termux-packages/$f" ] && echo "  ✅ $f" || echo "  ⚠️  $f 不存在"
          done
          echo ""
          echo "==> properties.sh 完整内容:"
          cat -n termux-packages/scripts/properties.sh

      # ============================================================
      #  Phase 2: 配置自定义包名
      # ============================================================
      - name: "✏️  修改 properties.sh — 注入自定义包名"
        run: |
          PROPS="termux-packages/scripts/properties.sh"
          OLD_PKG="com.termux"
          NEW_PKG="${PACKAGE_NAME}"

          if [ "${OLD_PKG}" = "${NEW_PKG}" ]; then
            echo "⚠️  包名与默认相同，跳过修改"
            exit 0
          fi

          echo "==> 替换: '${OLD_PKG}' → '${NEW_PKG}'"
          sed -i "s|${OLD_PKG}|${NEW_PKG}|g" "$PROPS"

          echo ""
          echo "==> 修改后完整内容:"
          cat -n "$PROPS"

          echo ""
          REMAINING=$(grep -c "${OLD_PKG}" "$PROPS" || true)
          if [ "$REMAINING" -gt 0 ]; then
            echo "⚠️  仍有 ${REMAINING} 处 '${OLD_PKG}' 未替换:"
            grep -n "${OLD_PKG}" "$PROPS"
          else
            echo "✅ 校验通过: 无残留旧包名"
          fi

      # ============================================================
      #  Phase 3: 生成容器内构建脚本
      #
      #  写入独立 .sh 文件，彻底避免 YAML→Shell→Docker 转义地狱。
      #  变量通过 sed 注入脚本头部，不依赖 Docker env 转发。
      #
      #  注意：run-docker.sh 使用 detach+exec 模型，自带 TTY 检测
      #  ([ -t 1 ]) 和 UID 映射，无需额外 patch。
      #  容器内 builder 用户受 AppArmor restricted profile 约束，
      #  不可 chmod volume mount 文件 → 一律用 bash 显式调用脚本。
      # ============================================================
      - name: "📝 生成容器内构建脚本"
        run: |
          cat > termux-packages/ci-build.sh << 'BUILDSCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "==========================================="
          echo " Termux Bootstrap CI Build"
          echo "==========================================="
          echo " Date:         $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo " Architecture: ${CI_TARGET_ARCH}"
          echo " Extra Pkgs:   ${CI_EXTRA_PACKAGES:-none}"
          echo " PWD:          $(pwd)"
          echo " User:         $(whoami) (UID=$(id -u))"
          echo ""
          echo " properties.sh 包名相关变量:"
          # 过滤注释行，只显示有效赋值
          grep -E "^[^#]*TERMUX_APP|^[^#]*TERMUX_BASE_DIR|^[^#]*TERMUX_HOME|^[^#]*TERMUX_PREFIX" scripts/properties.sh || true
          echo "==========================================="
          echo ""

          # ----------------------------------------------------------
          # Step 1: 构建额外软件包
          # ----------------------------------------------------------
          if [ -n "${CI_EXTRA_PACKAGES:-}" ]; then
            echo "==> [Step 1] 构建额外软件包..."
            IFS=',' read -ra PKG_ARRAY <<< "${CI_EXTRA_PACKAGES}"
            for pkg in "${PKG_ARRAY[@]}"; do
              pkg=$(echo "${pkg}" | xargs)
              [ -z "$pkg" ] && continue
              echo ""
              echo ">>> 构建: ${pkg} (${CI_TARGET_ARCH})"
              bash build-package.sh -a "${CI_TARGET_ARCH}" "${pkg}" || {
                echo "❌ 构建失败: ${pkg}"
                exit 1
              }
              echo "✅ 构建成功: ${pkg}"
            done
          else
            echo "==> [Step 1] 无额外软件包，跳过"
          fi

          # ----------------------------------------------------------
          # Step 2: 生成 bootstrap zip
          #
          # 优先 generate-bootstraps.sh（官方维护）
          # 回退 build-bootstrap.sh（社区方案）
          # 全部用 bash 显式调用，不依赖文件 +x 权限
          # ----------------------------------------------------------
          echo ""
          echo "==> [Step 2] 生成 bootstrap-${CI_TARGET_ARCH}.zip ..."

          if [ -f scripts/generate-bootstraps.sh ]; then
            echo "    使用: scripts/generate-bootstraps.sh"
            if grep -q "\-\-architectures" scripts/generate-bootstraps.sh; then
              bash scripts/generate-bootstraps.sh --architectures "${CI_TARGET_ARCH}"
            else
              echo "    脚本不接受 --architectures，直接运行..."
              TERMUX_ARCH="${CI_TARGET_ARCH}" bash scripts/generate-bootstraps.sh
            fi

          elif [ -f scripts/build-bootstrap.sh ]; then
            echo "    使用: scripts/build-bootstrap.sh (fallback)"
            bash scripts/build-bootstrap.sh --architectures "${CI_TARGET_ARCH}"

          else
            echo "❌ 未找到 bootstrap 生成脚本！"
            ls -la scripts/
            exit 1
          fi

          # ----------------------------------------------------------
          # Step 3: 校验产物
          # ----------------------------------------------------------
          echo ""
          echo "==> [Step 3] 检查构建产物..."
          find . -name "bootstrap-*.zip" -type f 2>/dev/null | while read -r f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            echo "    📦 ${f} ($(du -h "$f" | cut -f1), ${SIZE} bytes)"
            if [ "$SIZE" -lt 1048576 ]; then
              echo "    ⚠️  文件过小，可能不完整"
            fi
          done

          ZIP_COUNT=$(find . -name "bootstrap-*.zip" -type f 2>/dev/null | wc -l)
          if [ "$ZIP_COUNT" -eq 0 ]; then
            echo "❌ 未找到 bootstrap-*.zip！"
            echo "   所有 zip/deb 文件:"
            find . -maxdepth 3 \( -name "*.zip" -o -name "*.deb" \) -type f | head -30
            exit 1
          fi

          echo ""
          echo "✅ Bootstrap 构建完成！"
          BUILDSCRIPT

          # 注入变量到脚本头部（宿主机侧操作，无权限问题）
          sed -i "2i export CI_TARGET_ARCH=\"${TARGET_ARCH}\"" termux-packages/ci-build.sh
          sed -i "3i export CI_EXTRA_PACKAGES=\"${EXTRA_PACKAGES}\"" termux-packages/ci-build.sh

          echo "==> ci-build.sh 前 6 行:"
          head -6 termux-packages/ci-build.sh

      # ============================================================
      #  Phase 4: 执行构建
      #
      #  run-docker.sh 会:
      #    1. pull 镜像 ghcr.io/termux/package-builder
      #    2. docker run --detach 创建持久容器
      #    3. 映射 UID/GID (如需要)
      #    4. 加载 AppArmor profile
      #    5. docker exec 执行传入的命令
      #  TTY 自动检测 ([ -t 1 ])，CI 下不加 --tty。
      # ============================================================
      - name: "🔨 在 Docker 中执行构建"
        working-directory: termux-packages
        run: |
          echo "==> 当前磁盘:"
          df -h /
          echo ""
          echo "==> 启动构建（通过 run-docker.sh）..."
          ./scripts/run-docker.sh bash ci-build.sh

      # ============================================================
      #  Phase 5: 收集产物
      # ============================================================
      - name: "📦 收集构建产物"
        if: always()
        run: |
          mkdir -p output

          echo "==> 搜索 bootstrap zip..."
          find termux-packages -name "bootstrap-*.zip" -type f 2>/dev/null | while read -r f; do
            cp "$f" output/
            echo "  ✅ $(basename "$f") → output/"
          done

          FOUND=$(ls output/bootstrap-*.zip 2>/dev/null | wc -l || echo 0)
          if [ "$FOUND" -eq 0 ]; then
            echo "⚠️  未找到 bootstrap zip，收集调试信息..."
            find termux-packages -name "*.zip" -type f 2>/dev/null | head -20 > output/DEBUG_zip_files.txt || true
            find termux-packages -name "*.deb" -type f 2>/dev/null | head -50 > output/DEBUG_deb_files.txt || true
            cp termux-packages/scripts/properties.sh output/DEBUG_properties.sh 2>/dev/null || true
          fi

          {
            echo "Build Date:          $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Package Name:        ${PACKAGE_NAME}"
            echo "Target Architecture: ${TARGET_ARCH}"
            echo "Extra Packages:      ${EXTRA_PACKAGES:-none}"
            echo "termux-packages ref: ${TERMUX_PACKAGES_REF}"
            echo "Bootstrap files:     ${FOUND}"
          } > output/BUILD_INFO.txt

          echo ""
          echo "==> output/ 内容:"
          ls -lh output/

          if ls output/bootstrap-*.zip 1>/dev/null 2>&1; then
            echo ""
            echo "==> SHA256:"
            cd output && sha256sum bootstrap-*.zip | tee SHA256SUMS.txt
          fi

      - name: "⬆️  上传构建产物"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-bootstrap-${{ env.TARGET_ARCH }}-run${{ github.run_number }}
          path: output/
          retention-days: 90
          if-no-files-found: warn
