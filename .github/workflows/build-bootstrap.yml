name: Build Termux Bootstrap

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: '自定义包名 (e.g. com.mytermux)'
        required: false
        default: 'com.mytermux'
      packages:
        description: '额外软件包（逗号分隔, e.g. vim,curl,openssh）。留空 = 仅 bootstrap 基础包集'
        required: false
        default: ''
      termux_packages_ref:
        description: 'termux-packages 分支或 tag'
        required: false
        default: 'master'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PACKAGE_NAME: ${{ inputs.package_name || 'com.mytermux' }}
      EXTRA_PACKAGES: ${{ inputs.packages || '' }}
      TERMUX_PACKAGES_REF: ${{ inputs.termux_packages_ref || 'master' }}
      TARGET_ARCH: 'aarch64'

    steps:
      # ── Phase 1: 系统准备 ──────────────────────────────────────
      - name: "🧹 清理磁盘空间"
        run: |
          echo "=== 清理前磁盘使用 ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          echo "=== 清理后磁盘使用 ==="
          df -h /

      - name: "📥 克隆 termux-packages"
        run: |
          git clone --depth=1 --branch="${TERMUX_PACKAGES_REF}" \
            https://github.com/termux/termux-packages.git
          echo "=== 仓库结构 ==="
          ls -la termux-packages/
          echo "=== scripts/ 目录 ==="
          ls -la termux-packages/scripts/

      # ── Phase 2: 修改 properties.sh ───────────────────────────
      - name: "✏️  修改 properties.sh — 注入自定义包名"
        run: |
          PROPS="termux-packages/scripts/properties.sh"
          OLD_PKG="com.termux"
          NEW_PKG="${PACKAGE_NAME}"

          echo "=== 修改前关键行 ==="
          grep -n "com\.termux" "$PROPS" | head -20

          # ⚠️ 转义 . 为 \. 确保只匹配字面量点号，不会误伤 URL 中的 com/termux
          OLD_PKG_ESCAPED=$(echo "${OLD_PKG}" | sed 's/\./\\./g')
          echo "sed 匹配模式: ${OLD_PKG_ESCAPED}"

          sed -i "s|${OLD_PKG_ESCAPED}|${NEW_PKG}|g" "$PROPS"

          echo "=== 修改后关键行 ==="
          grep -n "${NEW_PKG}" "$PROPS" | head -20

          # URL 完整性校验 —— 如果 github.com/termux 被误改成 github.com.xxx 就报错
          BROKEN_URLS=$(grep -c "github\.com\.${NEW_PKG}" "$PROPS" || true)
          if [ "$BROKEN_URLS" -gt 0 ]; then
            echo "❌ 检测到 URL 被误替换！以下行包含损坏的 URL:"
            grep "github\.com\.${NEW_PKG}" "$PROPS"
            exit 1
          fi
          echo "✅ URL 完整性校验通过"

          # 最终确认 TERMUX_APP_PACKAGE 值
          echo "=== TERMUX_APP_PACKAGE 最终值 ==="
          grep "TERMUX_APP_PACKAGE" "$PROPS"

      # ── Phase 3: 补丁 generate-bootstraps.sh ───────────────────
      - name: "🩹 补丁 generate-bootstraps.sh — 修复 profile.d 目录缺失"
        run: |
          GEN="termux-packages/scripts/generate-bootstraps.sh"

          # 在写入 profile.d 文件之前插入 mkdir -p
          sed -i '/cat <<-TERMUX_BOOTSTRAP_SECOND_STAGE_DONE/i\
          mkdir -p "${TERMUX__PREFIX__PROFILE_D_DIR}"' "$GEN"

          echo "✅ 已插入 mkdir -p 补丁"
          grep -n "mkdir -p.*PROFILE_D" "$GEN" || echo "(验证 grep)"

      # ── Phase 4: 生成 ci-build.sh ──────────────────────────────
      - name: "📝 生成构建脚本 ci-build.sh"
        run: |
          cat > termux-packages/ci-build.sh << 'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "╔══════════════════════════════════════════════╗"
          echo "║   Termux Custom Bootstrap Builder  (v4)      ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "📋 构建环境信息:"
          echo "  TERMUX_APP_PACKAGE = $(grep TERMUX_APP_PACKAGE= scripts/properties.sh | head -1)"
          echo "  架构: aarch64"
          echo "  时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          # ══════════════════════════════════════════════════════
          # Step 0: 修复 Android SDK (termux-am 依赖)
          #
          # v4 核心修复:
          #   Docker 容器的 AppArmor profile 阻止 sdkmanager (Java 进程)
          #   写入 source.properties 文件，导致 SDK 组件无法通过 sdkmanager
          #   正常安装。解决方案：完全绕过 sdkmanager，直接用 curl 下载
          #   SDK 组件并手动创建 source.properties。
          # ══════════════════════════════════════════════════════
          echo "🔧 Step 0: 安装 Android SDK 组件 (v4 — 绕过 sdkmanager) ..."
          ANDROID_SDK_DIR=$(find /home/builder/lib -maxdepth 1 -name "android-sdk-*" -type d 2>/dev/null | head -1)

          if [ -z "$ANDROID_SDK_DIR" ]; then
            echo "  ⚠️ 未找到 Android SDK 根目录，创建新目录 ..."
            ANDROID_SDK_DIR="/home/builder/lib/android-sdk"
            mkdir -p "$ANDROID_SDK_DIR"
          fi

          echo "  SDK 根目录: $ANDROID_SDK_DIR"
          chmod -R u+w "$ANDROID_SDK_DIR" 2>/dev/null || true

          # ── 诊断：列出当前已安装的 SDK 内容 ──────────────────
          echo ""
          echo "  📂 当前 SDK 目录结构:"
          find "$ANDROID_SDK_DIR" -maxdepth 3 -type d 2>/dev/null | head -40
          echo ""
          echo "  📂 已有 build-tools 版本:"
          ls -la "$ANDROID_SDK_DIR/build-tools/" 2>/dev/null || echo "    (无)"
          echo "  📂 已有 platforms 版本:"
          ls -la "$ANDROID_SDK_DIR/platforms/" 2>/dev/null || echo "    (无)"
          echo ""

          # ── 需要的 SDK 组件 ──────────────────────────────────
          NEED_BT="30.0.3"
          NEED_PLATFORM="33"
          BT_DIR="$ANDROID_SDK_DIR/build-tools/$NEED_BT"
          PLATFORM_DIR="$ANDROID_SDK_DIR/platforms/android-$NEED_PLATFORM"
          SDK_OK=true

          # ── Tier 1: 检查是否已经存在所需版本 ─────────────────
          echo "  🔍 Tier 1: 检查已安装版本 ..."
          if [ -d "$BT_DIR" ] && [ -f "$BT_DIR/aapt" -o -f "$BT_DIR/aapt2" ]; then
            echo "    ✅ build-tools;$NEED_BT 已存在"
          else
            echo "    ❌ build-tools;$NEED_BT 未找到"
            SDK_OK=false
          fi

          if [ -d "$PLATFORM_DIR" ] && [ -f "$PLATFORM_DIR/android.jar" ]; then
            echo "    ✅ platforms;android-$NEED_PLATFORM 已存在"
          else
            echo "    ❌ platforms;android-$NEED_PLATFORM 未找到"
            SDK_OK=false
          fi

          # ── Tier 2: sdkmanager 尝试安装（可能被 AppArmor 阻止）
          if [ "$SDK_OK" = false ]; then
            echo ""
            echo "  🔧 Tier 2: 尝试 sdkmanager ..."
            SDKMANAGER=$(find "$ANDROID_SDK_DIR" -name "sdkmanager" -type f 2>/dev/null | head -1)
            if [ -n "$SDKMANAGER" ]; then
              echo "    sdkmanager: $SDKMANAGER"

              # 创建 latest 符号链接
              CMDLINE_DIR=$(dirname "$(dirname "$SDKMANAGER")")
              CMDLINE_PARENT=$(dirname "$CMDLINE_DIR")
              if [ ! -d "$CMDLINE_PARENT/latest" ]; then
                ln -sf "$CMDLINE_DIR" "$CMDLINE_PARENT/latest" 2>/dev/null || true
              fi

              yes 2>/dev/null | "$SDKMANAGER" --sdk_root="$ANDROID_SDK_DIR" --licenses 2>&1 | tail -3 || true
              "$SDKMANAGER" --sdk_root="$ANDROID_SDK_DIR" \
                "platforms;android-$NEED_PLATFORM" "build-tools;$NEED_BT" \
                2>&1 | tail -10 || echo "    ⚠️ sdkmanager 失败（预期，将用 curl 手动安装）"
            else
              echo "    ⚠️ sdkmanager 不存在，跳过"
            fi

            # 再次检查
            if [ -d "$BT_DIR" ] && [ -f "$PLATFORM_DIR/android.jar" ] 2>/dev/null; then
              echo "    ✅ sdkmanager 安装成功！"
              SDK_OK=true
            fi
          fi

          # ── Tier 3: 手动 curl 下载 SDK 组件 ─────────────────
          if [ "$SDK_OK" = false ]; then
            echo ""
            echo "  📥 Tier 3: 手动下载 SDK 组件 (curl) ..."

            # ── build-tools;30.0.3 ──
            if [ ! -d "$BT_DIR" ] || [ ! -f "$BT_DIR/aapt" -a ! -f "$BT_DIR/aapt2" ]; then
              echo "    下载 build-tools;$NEED_BT ..."
              BT_URL="https://dl.google.com/android/repository/build-tools_r${NEED_BT}-linux.zip"
              BT_ZIP="/tmp/build-tools-${NEED_BT}.zip"
              if curl -fSL --retry 3 --retry-delay 5 -o "$BT_ZIP" "$BT_URL" 2>&1; then
                echo "    解压到 $BT_DIR ..."
                mkdir -p "$BT_DIR"
                # Google zip 内部通常有一层目录 android-XX 或 build-tools
                TMP_EXTRACT="/tmp/bt-extract-$$"
                mkdir -p "$TMP_EXTRACT"
                unzip -q -o "$BT_ZIP" -d "$TMP_EXTRACT"
                # 找到包含 aapt/aapt2 的目录
                INNER_DIR=$(find "$TMP_EXTRACT" -name "aapt2" -type f -exec dirname {} \; 2>/dev/null | head -1)
                if [ -z "$INNER_DIR" ]; then
                  INNER_DIR=$(find "$TMP_EXTRACT" -name "aapt" -type f -exec dirname {} \; 2>/dev/null | head -1)
                fi
                if [ -n "$INNER_DIR" ]; then
                  cp -a "$INNER_DIR"/. "$BT_DIR/"
                  echo "    ✅ build-tools 文件已复制"
                else
                  # fallback: 复制解压目录里的第一个子目录
                  FIRST_SUBDIR=$(find "$TMP_EXTRACT" -mindepth 1 -maxdepth 1 -type d | head -1)
                  if [ -n "$FIRST_SUBDIR" ]; then
                    cp -a "$FIRST_SUBDIR"/. "$BT_DIR/"
                    echo "    ✅ build-tools 文件已复制 (fallback)"
                  fi
                fi
                rm -rf "$TMP_EXTRACT" "$BT_ZIP"

                # 创建 source.properties（Gradle 用来识别已安装组件）
                cat > "$BT_DIR/source.properties" << PROPS_EOF
          Pkg.Revision=$NEED_BT
          Pkg.Path=build-tools;$NEED_BT
          Pkg.Desc=Android SDK Build-Tools $NEED_BT
          PROPS_EOF
                chmod 644 "$BT_DIR/source.properties"
                echo "    ✅ source.properties 已创建"
              else
                echo "    ❌ build-tools 下载失败 (HTTP 错误)"
              fi
            fi

            # ── platforms;android-33 ──
            if [ ! -d "$PLATFORM_DIR" ] || [ ! -f "$PLATFORM_DIR/android.jar" ]; then
              echo "    下载 platforms;android-$NEED_PLATFORM ..."
              # platform-33 的 zip 文件名
              PLAT_URL="https://dl.google.com/android/repository/platform-${NEED_PLATFORM}-ext7_r04.zip"
              PLAT_ZIP="/tmp/platform-${NEED_PLATFORM}.zip"

              # 尝试多个可能的 URL（Google 的命名规则不完全统一）
              PLAT_URLS=(
                "https://dl.google.com/android/repository/platform-${NEED_PLATFORM}-ext7_r04.zip"
                "https://dl.google.com/android/repository/platform-${NEED_PLATFORM}_r03.zip"
                "https://dl.google.com/android/repository/platform-${NEED_PLATFORM}_r02.zip"
                "https://dl.google.com/android/repository/platform-${NEED_PLATFORM}_r01.zip"
              )

              PLAT_DOWNLOADED=false
              for PLAT_URL in "${PLAT_URLS[@]}"; do
                echo "    尝试: $PLAT_URL"
                if curl -fSL --retry 2 --retry-delay 3 -o "$PLAT_ZIP" "$PLAT_URL" 2>&1; then
                  echo "    ✅ 下载成功"
                  PLAT_DOWNLOADED=true
                  break
                else
                  echo "    ⚠️ 此 URL 不可用，尝试下一个"
                fi
              done

              if [ "$PLAT_DOWNLOADED" = true ]; then
                echo "    解压到 $PLATFORM_DIR ..."
                mkdir -p "$PLATFORM_DIR"
                TMP_EXTRACT="/tmp/plat-extract-$$"
                mkdir -p "$TMP_EXTRACT"
                unzip -q -o "$PLAT_ZIP" -d "$TMP_EXTRACT"
                # 找到 android.jar 所在目录
                INNER_DIR=$(find "$TMP_EXTRACT" -name "android.jar" -type f -exec dirname {} \; 2>/dev/null | head -1)
                if [ -n "$INNER_DIR" ]; then
                  cp -a "$INNER_DIR"/. "$PLATFORM_DIR/"
                  echo "    ✅ platform 文件已复制"
                else
                  FIRST_SUBDIR=$(find "$TMP_EXTRACT" -mindepth 1 -maxdepth 1 -type d | head -1)
                  if [ -n "$FIRST_SUBDIR" ]; then
                    cp -a "$FIRST_SUBDIR"/. "$PLATFORM_DIR/"
                    echo "    ✅ platform 文件已复制 (fallback)"
                  fi
                fi
                rm -rf "$TMP_EXTRACT" "$PLAT_ZIP"

                cat > "$PLATFORM_DIR/source.properties" << PROPS_EOF
          Pkg.Revision=3
          Pkg.Path=platforms;android-$NEED_PLATFORM
          Pkg.Desc=Android SDK Platform $NEED_PLATFORM
          AndroidVersion.ApiLevel=$NEED_PLATFORM
          PROPS_EOF
                chmod 644 "$PLATFORM_DIR/source.properties"
                echo "    ✅ source.properties 已创建"
              else
                echo "    ❌ 所有 platform URL 均下载失败"
              fi
            fi
          fi

          # ── Tier 4: 符号链接 fallback ────────────────────────
          # 如果手动下载也失败，检查是否有其他版本可以借用
          if [ ! -d "$BT_DIR" ] || { [ ! -f "$BT_DIR/aapt" ] && [ ! -f "$BT_DIR/aapt2" ]; }; then
            echo ""
            echo "  🔗 Tier 4: build-tools 符号链接 fallback ..."
            EXISTING_BT=$(find "$ANDROID_SDK_DIR/build-tools" -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
            if [ -n "$EXISTING_BT" ]; then
              echo "    发现已安装版本: $EXISTING_BT"
              ln -sfn "$EXISTING_BT" "$BT_DIR" 2>/dev/null || cp -a "$EXISTING_BT" "$BT_DIR"
              # 确保 source.properties 中版本号匹配
              cat > "$BT_DIR/source.properties" << PROPS_EOF
          Pkg.Revision=$NEED_BT
          Pkg.Path=build-tools;$NEED_BT
          Pkg.Desc=Android SDK Build-Tools $NEED_BT
          PROPS_EOF
              echo "    ✅ 已创建符号链接: $EXISTING_BT -> $BT_DIR"
            else
              echo "    ⚠️ 无可用的 build-tools 版本进行 fallback"
            fi
          fi

          if [ ! -d "$PLATFORM_DIR" ] || [ ! -f "$PLATFORM_DIR/android.jar" ]; then
            echo ""
            echo "  🔗 Tier 4: platforms 符号链接 fallback ..."
            EXISTING_PLAT=$(find "$ANDROID_SDK_DIR/platforms" -maxdepth 1 -mindepth 1 -type d 2>/dev/null | head -1)
            if [ -n "$EXISTING_PLAT" ]; then
              echo "    发现已安装版本: $EXISTING_PLAT"
              ln -sfn "$EXISTING_PLAT" "$PLATFORM_DIR" 2>/dev/null || cp -a "$EXISTING_PLAT" "$PLATFORM_DIR"
              cat > "$PLATFORM_DIR/source.properties" << PROPS_EOF
          Pkg.Revision=3
          Pkg.Path=platforms;android-$NEED_PLATFORM
          Pkg.Desc=Android SDK Platform $NEED_PLATFORM
          AndroidVersion.ApiLevel=$NEED_PLATFORM
          PROPS_EOF
              echo "    ✅ 已创建符号链接: $EXISTING_PLAT -> $PLATFORM_DIR"
            else
              echo "    ⚠️ 无可用的 platforms 版本进行 fallback"
            fi
          fi

          # ── 最终验证 ─────────────────────────────────────────
          echo ""
          echo "  🔍 SDK 最终验证:"
          if [ -d "$BT_DIR" ]; then
            echo "    ✅ build-tools;$NEED_BT → $(ls "$BT_DIR/" | head -10 | tr '\n' ' ')"
            echo "    source.properties: $(cat "$BT_DIR/source.properties" 2>/dev/null | head -1)"
          else
            echo "    ❌ build-tools;$NEED_BT 仍缺失！"
          fi

          if [ -d "$PLATFORM_DIR" ] && [ -f "$PLATFORM_DIR/android.jar" ]; then
            echo "    ✅ platforms;android-$NEED_PLATFORM → android.jar 存在"
            echo "    source.properties: $(cat "$PLATFORM_DIR/source.properties" 2>/dev/null | head -1)"
          else
            echo "    ❌ platforms;android-$NEED_PLATFORM 仍缺失！"
          fi

          # 确保 ANDROID_HOME / ANDROID_SDK_ROOT 被正确设置
          export ANDROID_HOME="$ANDROID_SDK_DIR"
          export ANDROID_SDK_ROOT="$ANDROID_SDK_DIR"
          echo ""
          echo "  ANDROID_HOME=$ANDROID_HOME"
          echo "  ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"

          # 确保 licenses 目录存在（Gradle 也会检查）
          mkdir -p "$ANDROID_SDK_DIR/licenses"
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > "$ANDROID_SDK_DIR/licenses/android-sdk-license"
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > "$ANDROID_SDK_DIR/licenses/android-sdk-preview-license"
          echo "  ✅ SDK licenses 已写入"
          echo ""

          # ── Step 1: 构建所有 bootstrap 基础包 ──────────────────
          echo "📦 Step 1: 构建 bootstrap 基础包 ..."

          # ⚠️ 使用【父包名】而非子包名：
          #   bzip2 是 libbz2 的子包
          #   curl 是 libcurl 的子包
          #   xz-utils 是 liblzma 的子包
          #
          # ⚠️ 不使用 -I 标志！
          #   -I 会从官方 Termux 仓库下载预编译的依赖包，
          #   这些包的路径写死为 com.termux，对自定义包名无效。
          #   不加 -I 则从源码编译所有依赖，确保路径正确。
          BUILD_PACKAGES=(
            apt
            bash
            libbz2
            command-not-found
            coreutils
            libcurl
            dash
            diffutils
            findutils
            gawk
            grep
            gzip
            less
            procps
            psmisc
            sed
            tar
            termux-core
            termux-exec
            termux-keyring
            termux-tools
            util-linux
            liblzma
            ed
            debianutils
            dos2unix
            inetutils
            lsof
            nano
            net-tools
            patch
            unzip
          )

          TOTAL=${#BUILD_PACKAGES[@]}
          SUCCESS=0
          FAILED=0
          FAILED_LIST=""

          for i in "${!BUILD_PACKAGES[@]}"; do
            PKG="${BUILD_PACKAGES[$i]}"
            NUM=$((i + 1))
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  [$NUM/$TOTAL] 构建: $PKG"
            echo "  $(date -u '+%H:%M:%S UTC')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            if bash build-package.sh -a aarch64 "$PKG" 2>&1 | tail -50; then
              echo "  ✅ $PKG 构建成功 ($(date -u '+%H:%M:%S UTC'))"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ $PKG 构建失败 (exit code: $?) ($(date -u '+%H:%M:%S UTC'))"
              FAILED=$((FAILED + 1))
              FAILED_LIST="${FAILED_LIST} ${PKG}"
            fi
          done

          echo ""
          echo "══════════════════════════════════════════"
          echo "  基础包构建完成: $SUCCESS/$TOTAL 成功"
          if [ $FAILED -gt 0 ]; then
            echo "  失败的包: $FAILED_LIST"
          fi
          echo "══════════════════════════════════════════"
          echo ""

          # ── Step 1.5: 构建额外用户指定的包 ─────────────────────
          EXTRA_PACKAGES_RAW="${EXTRA_PACKAGES:-}"
          if [ -n "$EXTRA_PACKAGES_RAW" ]; then
            echo "📦 Step 1.5: 构建额外包 ..."
            IFS=',' read -ra EXTRA_PKGS <<< "$EXTRA_PACKAGES_RAW"
            for PKG in "${EXTRA_PKGS[@]}"; do
              PKG=$(echo "$PKG" | xargs)  # trim whitespace
              [ -z "$PKG" ] && continue
              echo "  构建额外包: $PKG"
              bash build-package.sh -a aarch64 "$PKG" 2>&1 | tail -20 || {
                echo "  ⚠️ 额外包 $PKG 构建失败 (非致命)"
              }
            done
            echo ""
          fi

          # ── Step 2: 创建本地 apt 仓库 ──────────────────────────
          echo "📂 Step 2: 创建本地 apt 仓库 ..."

          DEB_SOURCE="./output"
          LOCAL_REPO="/tmp/local-termux-repo"
          REPO_DIR="${LOCAL_REPO}/dists/stable/main/binary-aarch64"

          mkdir -p "$REPO_DIR"

          echo "  从 $DEB_SOURCE 收集 .deb 文件 ..."
          DEB_COUNT=$(find "${DEB_SOURCE}" -name "*.deb" -type f 2>/dev/null | wc -l)
          echo "  找到 $DEB_COUNT 个 .deb 文件"

          if [ "$DEB_COUNT" -eq 0 ]; then
            echo "❌ 没有找到任何 .deb 文件！无法继续。"
            echo "  检查 output/ 目录:"
            ls -la "${DEB_SOURCE}/" 2>/dev/null || echo "  output/ 目录不存在"
            exit 1
          fi

          # 复制所有 .deb 到仓库目录
          find "${DEB_SOURCE}" -name "*.deb" -type f -exec cp {} "$REPO_DIR/" \;

          echo "  仓库中的 .deb 文件:"
          ls -la "$REPO_DIR/"*.deb 2>/dev/null | head -60

          # ── 关键 bootstrap 包检查 ─────────────────────────────
          echo ""
          echo "  🔍 关键 bootstrap 包检查:"
          for check_pkg in apt bash bzip2 curl xz-utils termux-core termux-tools termux-am; do
            FOUND=$(find "${DEB_SOURCE}" -name "${check_pkg}_*.deb" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "    ✅ ${check_pkg}: $(basename "$FOUND")"
            else
              echo "    ❌ ${check_pkg}: 未找到 .deb"
            fi
          done
          echo ""

          # 生成 Packages 索引
          cd "$REPO_DIR"
          dpkg-scanpackages --multiversion . /dev/null 2>/dev/null > Packages
          gzip -k Packages
          echo "  Packages 索引条目数: $(grep -c '^Package:' Packages)"
          cd /home/builder/termux-packages

          # 生成 Release 文件
          cat > "${LOCAL_REPO}/dists/stable/Release" << 'RELEASE_EOF'
          Origin: termux-custom
          Label: termux-custom
          Suite: stable
          Codename: stable
          Architectures: aarch64
          Components: main
          RELEASE_EOF

          echo "  ✅ 本地仓库创建完成: $LOCAL_REPO"
          echo ""

          # ── Step 3: 生成 bootstrap zip ────────────────────────
          echo "🎯 Step 3: 生成 bootstrap.zip ..."
          echo "  仓库路径: file://${LOCAL_REPO}"

          bash scripts/generate-bootstraps.sh \
            --repository "file://${LOCAL_REPO}" \
            --architectures aarch64 \
            2>&1 | tail -50

          echo ""
          echo "🔍 查找生成的 bootstrap 文件 ..."
          find . -name "bootstrap-*.zip" -type f 2>/dev/null
          ls -lh bootstrap-*.zip 2>/dev/null || echo "  未找到 bootstrap zip"

          echo ""
          echo "✅ 构建流程完成！"
          SCRIPT_EOF

          chmod +x termux-packages/ci-build.sh
          echo "✅ ci-build.sh 已生成 (v4)"
          echo ""
          echo "=== v4 关键变更 ==="
          echo "1. 全新 Step 0: 四级 SDK 安装策略 (检查已有 → sdkmanager → curl 手动下载 → 符号链接)"
          echo "2. 手动创建 source.properties 让 Gradle 识别 SDK 组件"
          echo "3. 手动写入 SDK licenses 文件"
          echo "4. 保留 v3 所有修复 (无 -I 标志, sed 转义, profile.d 补丁)"

      # ── Phase 5: Docker 构建 ─────────────────────────────────
      - name: "🐳 Docker 构建 (run-docker.sh)"
        working-directory: termux-packages
        env:
          EXTRA_PACKAGES: ${{ env.EXTRA_PACKAGES }}
        run: |
          echo "=== 启动 Docker 构建 ==="
          echo "  包名: ${PACKAGE_NAME}"
          echo "  架构: aarch64"
          echo "  额外包: ${EXTRA_PACKAGES:-无}"
          echo "  ⏱  预计耗时: 2-4 小时（从源码编译所有包及其依赖）"
          echo ""

          bash scripts/run-docker.sh bash ci-build.sh

      # ── Phase 6: 收集产物 ─────────────────────────────────────
      - name: "📦 收集构建产物"
        if: always()
        run: |
          echo "=== 查找所有 bootstrap zip ==="
          find termux-packages -name "bootstrap-*.zip" -type f 2>/dev/null

          BOOTSTRAP=$(find termux-packages -name "bootstrap-aarch64.zip" -type f 2>/dev/null | head -1)
          if [ -n "$BOOTSTRAP" ]; then
            echo "✅ 找到: $BOOTSTRAP"
            ls -lh "$BOOTSTRAP"
            cp "$BOOTSTRAP" ./bootstrap-aarch64.zip
          else
            echo "⚠️ 未找到 bootstrap-aarch64.zip"
            echo "=== termux-packages 根目录文件 ==="
            ls -la termux-packages/
            echo "=== 查找所有 .zip ==="
            find termux-packages -name "*.zip" -type f 2>/dev/null
          fi

      - name: "⬆️  上传 Artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-bootstrap-${{ env.PACKAGE_NAME }}-aarch64
          path: |
            bootstrap-aarch64.zip
            termux-packages/output/*.deb
          if-no-files-found: warn
          retention-days: 30
