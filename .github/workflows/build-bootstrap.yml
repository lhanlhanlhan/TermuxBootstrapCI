name: Build Termux Bootstrap

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: '自定义包名 (e.g. com.mytermux)'
        required: false
        default: 'com.mytermux'
      packages:
        description: '额外软件包（逗号分隔, e.g. vim,curl,openssh）。留空 = 仅 bootstrap 基础包集'
        required: false
        default: ''
      termux_packages_ref:
        description: 'termux-packages 分支或 tag'
        required: false
        default: 'master'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PACKAGE_NAME: ${{ inputs.package_name || 'com.mytermux' }}
      EXTRA_PACKAGES: ${{ inputs.packages || '' }}
      TERMUX_PACKAGES_REF: ${{ inputs.termux_packages_ref || 'master' }}
      TARGET_ARCH: 'aarch64'

    steps:
      # ── Phase 1: 系统准备 ──────────────────────────────────────
      - name: "🧹 清理磁盘空间"
        run: |
          echo "=== 清理前磁盘使用 ==="
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          echo "=== 清理后磁盘使用 ==="
          df -h /

      - name: "📥 克隆 termux-packages"
        run: |
          git clone --depth=1 --branch="${TERMUX_PACKAGES_REF}" \
            https://github.com/termux/termux-packages.git
          echo "=== 仓库结构 ==="
          ls -la termux-packages/
          echo "=== scripts/ 目录 ==="
          ls -la termux-packages/scripts/

      # ── Phase 2: 修改 properties.sh ───────────────────────────
      - name: "✏️  修改 properties.sh — 注入自定义包名"
        run: |
          PROPS="termux-packages/scripts/properties.sh"
          OLD_PKG="com.termux"
          NEW_PKG="${PACKAGE_NAME}"

          echo "=== 修改前关键行 ==="
          grep -n "com\.termux" "$PROPS" | head -20

          OLD_PKG_ESCAPED=$(echo "${OLD_PKG}" | sed 's/\./\\./g')
          echo "sed 匹配模式: ${OLD_PKG_ESCAPED}"

          sed -i "s|${OLD_PKG_ESCAPED}|${NEW_PKG}|g" "$PROPS"

          echo "=== 修改后关键行 ==="
          grep -n "${NEW_PKG}" "$PROPS" | head -20

          BROKEN_URLS=$(grep -c "github\.com\.${NEW_PKG}" "$PROPS" || true)
          if [ "$BROKEN_URLS" -gt 0 ]; then
            echo "❌ 检测到 URL 被误替换！"
            grep "github\.com\.${NEW_PKG}" "$PROPS"
            exit 1
          fi
          echo "✅ URL 完整性校验通过"
          grep "TERMUX_APP_PACKAGE" "$PROPS"

      # ── Phase 3: 补丁 generate-bootstraps.sh ───────────────────
      - name: "🩹 补丁 generate-bootstraps.sh — 修复 profile.d 目录缺失"
        run: |
          GEN="termux-packages/scripts/generate-bootstraps.sh"
          sed -i '/cat <<-TERMUX_BOOTSTRAP_SECOND_STAGE_DONE/i\
          mkdir -p "${TERMUX__PREFIX__PROFILE_D_DIR}"' "$GEN"
          echo "✅ 已插入 mkdir -p 补丁"
          grep -n "mkdir -p.*PROFILE_D" "$GEN" || echo "(验证 grep)"

      # ── Phase 4: 生成 ci-build.sh ──────────────────────────────
      - name: "📝 生成构建脚本 ci-build.sh"
        run: |
          cat > termux-packages/ci-build.sh << 'SCRIPT_EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "╔══════════════════════════════════════════════╗"
          echo "║   Termux Custom Bootstrap Builder  (v5)      ║"
          echo "╚══════════════════════════════════════════════╝"
          echo ""
          echo "📋 构建环境信息:"
          echo "  TERMUX_APP_PACKAGE = $(grep TERMUX_APP_PACKAGE= scripts/properties.sh | head -1)"
          echo "  架构: aarch64"
          echo "  时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

          # ══════════════════════════════════════════════════════════
          # Step 0: 修复 Android SDK
          #
          # v5: Docker 镜像内的 SDK 目录为 root 所有，builder 用户
          #     无写入权限（chmod 也不行）。解决方案：
          #     1) cp -a 整个 SDK 到 /tmp（可写）
          #     2) 在新位置补装缺失的 build-tools 和 platform
          #     3) 手动写 source.properties 让 Gradle 识别
          #     4) 写一个全局 gradle.properties 强制 sdk.dir 指向新位置
          # ══════════════════════════════════════════════════════════
          echo "🔧 Step 0: 安装 Android SDK 组件 (v5) ..."

          ORIG_SDK=$(find /home/builder/lib -maxdepth 1 -name "android-sdk-*" -type d 2>/dev/null | head -1)
          SDK="/tmp/android-sdk"

          # ── 0a: 复制原始 SDK 到 /tmp ─────────────────────────
          if [ -n "$ORIG_SDK" ]; then
            echo "  原始 SDK: $ORIG_SDK"
            echo "  复制到: $SDK ..."
            cp -a "$ORIG_SDK" "$SDK"
            chmod -R u+w "$SDK"
            echo "  ✅ SDK 复制完成 ($(du -sh "$SDK" | cut -f1))"
          else
            echo "  ⚠️ 无原始 SDK，创建空目录"
            mkdir -p "$SDK"
          fi

          export ANDROID_HOME="$SDK"
          export ANDROID_SDK_ROOT="$SDK"

          # ── 0b: 诊断 ────────────────────────────────────────
          echo ""
          echo "  📂 build-tools:"
          ls "$SDK/build-tools/" 2>/dev/null || echo "    (空)"
          echo "  📂 platforms:"
          ls "$SDK/platforms/" 2>/dev/null || echo "    (空)"
          echo ""

          # ── 0c: 安装 build-tools;30.0.3 ─────────────────────
          BT_DIR="$SDK/build-tools/30.0.3"
          if [ -d "$BT_DIR" ] && { [ -f "$BT_DIR/aapt" ] || [ -f "$BT_DIR/aapt2" ]; }; then
            echo "  ✅ build-tools;30.0.3 已存在"
          else
            echo "  📥 下载 build-tools;30.0.3 ..."
            BT_ZIP="/tmp/bt.zip"
            curl -fSL --retry 3 -o "$BT_ZIP" \
              "https://dl.google.com/android/repository/build-tools_r30.0.3-linux.zip" 2>&1

            mkdir -p "$BT_DIR"
            TMP="/tmp/bt-ex-$$"
            mkdir -p "$TMP"
            unzip -q -o "$BT_ZIP" -d "$TMP"

            # 找到包含 aapt/aapt2 的实际目录
            INNER=$(find "$TMP" -name "aapt2" -o -name "aapt" 2>/dev/null | head -1)
            [ -n "$INNER" ] && INNER=$(dirname "$INNER")
            [ -z "$INNER" ] && INNER=$(find "$TMP" -mindepth 1 -maxdepth 1 -type d | head -1)

            if [ -n "$INNER" ]; then
              cp -a "$INNER"/. "$BT_DIR/"
              echo "  ✅ build-tools 已安装"
            else
              echo "  ❌ zip 内容结构异常"
              ls -R "$TMP/" | head -30
            fi
            rm -rf "$TMP" "$BT_ZIP"

            # source.properties
            cat > "$BT_DIR/source.properties" << 'BTSP'
          Pkg.Revision=30.0.3
          Pkg.Path=build-tools;30.0.3
          Pkg.Desc=Android SDK Build-Tools 30.0.3
          BTSP
            echo "  ✅ source.properties 已创建"
          fi

          # ── 0d: 安装 platforms;android-33 ────────────────────
          PLAT_DIR="$SDK/platforms/android-33"
          if [ -d "$PLAT_DIR" ] && [ -f "$PLAT_DIR/android.jar" ]; then
            echo "  ✅ platforms;android-33 已存在"
          else
            echo "  📥 下载 platforms;android-33 ..."
            PLAT_ZIP="/tmp/plat.zip"
            PLAT_OK=false
            for url in \
              "https://dl.google.com/android/repository/platform-33-ext7_r04.zip" \
              "https://dl.google.com/android/repository/platform-33_r03.zip" \
              "https://dl.google.com/android/repository/platform-33_r02.zip" \
              "https://dl.google.com/android/repository/platform-33_r01.zip" \
            ; do
              echo "    尝试: $url"
              if curl -fSL --retry 2 -o "$PLAT_ZIP" "$url" 2>&1; then
                PLAT_OK=true; break
              fi
            done

            if [ "$PLAT_OK" = true ]; then
              mkdir -p "$PLAT_DIR"
              TMP="/tmp/plat-ex-$$"
              mkdir -p "$TMP"
              unzip -q -o "$PLAT_ZIP" -d "$TMP"
              INNER=$(find "$TMP" -name "android.jar" -type f -exec dirname {} \; 2>/dev/null | head -1)
              [ -z "$INNER" ] && INNER=$(find "$TMP" -mindepth 1 -maxdepth 1 -type d | head -1)
              if [ -n "$INNER" ]; then
                cp -a "$INNER"/. "$PLAT_DIR/"
                echo "  ✅ platform 已安装"
              fi
              rm -rf "$TMP" "$PLAT_ZIP"
            else
              echo "  ❌ 所有 URL 失败，尝试符号链接 fallback ..."
              EXISTING=$(find "$SDK/platforms" -mindepth 1 -maxdepth 1 -type d 2>/dev/null | head -1)
              if [ -n "$EXISTING" ]; then
                ln -sfn "$EXISTING" "$PLAT_DIR"
                echo "  🔗 已链接 $EXISTING -> $PLAT_DIR"
              fi
            fi

            cat > "$PLAT_DIR/source.properties" << 'PLATSP'
          Pkg.Revision=3
          Pkg.Path=platforms;android-33
          Pkg.Desc=Android SDK Platform 33
          AndroidVersion.ApiLevel=33
          PLATSP
            echo "  ✅ source.properties 已创建"
          fi

          # ── 0e: licenses + 环境变量 ─────────────────────────
          mkdir -p "$SDK/licenses"
          printf '\n24333f8a63b6825ea9c5514f83c2829b004d1fee' > "$SDK/licenses/android-sdk-license"
          printf '\n84831b9409646a918e30573bab4c9c91346d8abd' > "$SDK/licenses/android-sdk-preview-license"

          # ── 0f: 全局 gradle.properties 强制 sdk.dir ──────────
          # Gradle 可能忽略 ANDROID_HOME 而去读 local.properties / gradle.properties
          # 写入全局 gradle.properties 确保所有 Gradle 构建都能找到 SDK
          GRADLE_HOME="/home/builder/.gradle"
          mkdir -p "$GRADLE_HOME"
          echo "android.dir=$SDK" >> "$GRADLE_HOME/gradle.properties"
          echo "sdk.dir=$SDK"     >> "$GRADLE_HOME/gradle.properties"
          echo "  ✅ ~/.gradle/gradle.properties 已写入 sdk.dir=$SDK"

          # ── 0g: 最终验证 ─────────────────────────────────────
          echo ""
          echo "  🔍 SDK 最终验证:"
          echo "    ANDROID_HOME=$ANDROID_HOME"
          if [ -f "$BT_DIR/aapt2" ] || [ -f "$BT_DIR/aapt" ]; then
            echo "    ✅ build-tools;30.0.3 → OK"
          else
            echo "    ❌ build-tools;30.0.3 → 缺失"
          fi
          if [ -f "$PLAT_DIR/android.jar" ]; then
            echo "    ✅ platforms;android-33 → OK"
          else
            echo "    ❌ platforms;android-33 → 缺失"
          fi
          echo ""

          # ══════════════════════════════════════════════════════════
          # Step 1: 构建所有 bootstrap 基础包
          # ══════════════════════════════════════════════════════════
          echo "📦 Step 1: 构建 bootstrap 基础包 ..."

          BUILD_PACKAGES=(
            apt bash libbz2 command-not-found coreutils libcurl dash diffutils
            findutils gawk grep gzip less procps psmisc sed tar termux-core
            termux-exec termux-keyring termux-tools util-linux liblzma ed
            debianutils dos2unix inetutils lsof nano net-tools patch unzip
          )

          TOTAL=${#BUILD_PACKAGES[@]}
          SUCCESS=0
          FAILED=0
          FAILED_LIST=""

          for i in "${!BUILD_PACKAGES[@]}"; do
            PKG="${BUILD_PACKAGES[$i]}"
            NUM=$((i + 1))
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "  [$NUM/$TOTAL] 构建: $PKG  $(date -u '+%H:%M:%S UTC')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

            if bash build-package.sh -a aarch64 "$PKG" 2>&1 | tail -50; then
              echo "  ✅ $PKG 成功 ($(date -u '+%H:%M:%S UTC'))"
              SUCCESS=$((SUCCESS + 1))
            else
              echo "  ❌ $PKG 失败 ($(date -u '+%H:%M:%S UTC'))"
              FAILED=$((FAILED + 1))
              FAILED_LIST="${FAILED_LIST} ${PKG}"
            fi
          done

          echo ""
          echo "══════════════════════════════════════════"
          echo "  基础包: $SUCCESS/$TOTAL 成功"
          [ $FAILED -gt 0 ] && echo "  失败: $FAILED_LIST"
          echo "══════════════════════════════════════════"
          echo ""

          # ── Step 1.5: 额外包 ────────────────────────────────
          EXTRA_PACKAGES_RAW="${EXTRA_PACKAGES:-}"
          if [ -n "$EXTRA_PACKAGES_RAW" ]; then
            echo "📦 Step 1.5: 构建额外包 ..."
            IFS=',' read -ra EXTRA_PKGS <<< "$EXTRA_PACKAGES_RAW"
            for PKG in "${EXTRA_PKGS[@]}"; do
              PKG=$(echo "$PKG" | xargs)
              [ -z "$PKG" ] && continue
              echo "  构建: $PKG"
              bash build-package.sh -a aarch64 "$PKG" 2>&1 | tail -20 || echo "  ⚠️ $PKG 失败"
            done
            echo ""
          fi

          # ══════════════════════════════════════════════════════════
          # Step 2: 本地 apt 仓库
          # ══════════════════════════════════════════════════════════
          echo "📂 Step 2: 创建本地 apt 仓库 ..."

          DEB_SOURCE="./output"
          LOCAL_REPO="/tmp/local-termux-repo"
          REPO_DIR="${LOCAL_REPO}/dists/stable/main/binary-aarch64"
          mkdir -p "$REPO_DIR"

          DEB_COUNT=$(find "$DEB_SOURCE" -name "*.deb" -type f 2>/dev/null | wc -l)
          echo "  找到 $DEB_COUNT 个 .deb 文件"
          [ "$DEB_COUNT" -eq 0 ] && { echo "❌ 无 .deb 文件！"; exit 1; }

          find "$DEB_SOURCE" -name "*.deb" -type f -exec cp {} "$REPO_DIR/" \;

          echo ""
          echo "  🔍 关键包检查:"
          for p in apt bash bzip2 curl xz-utils termux-core termux-tools termux-am; do
            F=$(find "$DEB_SOURCE" -name "${p}_*.deb" -type f 2>/dev/null | head -1)
            [ -n "$F" ] && echo "    ✅ $p" || echo "    ❌ $p"
          done
          echo ""

          cd "$REPO_DIR"
          dpkg-scanpackages --multiversion . /dev/null 2>/dev/null > Packages
          gzip -k Packages
          echo "  Packages 条目: $(grep -c '^Package:' Packages)"
          cd /home/builder/termux-packages

          cat > "${LOCAL_REPO}/dists/stable/Release" << 'RELEASE_EOF'
          Origin: termux-custom
          Label: termux-custom
          Suite: stable
          Codename: stable
          Architectures: aarch64
          Components: main
          RELEASE_EOF

          echo "  ✅ 本地仓库就绪"
          echo ""

          # ══════════════════════════════════════════════════════════
          # Step 3: 生成 bootstrap zip
          # ══════════════════════════════════════════════════════════
          echo "🎯 Step 3: 生成 bootstrap.zip ..."

          bash scripts/generate-bootstraps.sh \
            --repository "file://${LOCAL_REPO}" \
            --architectures aarch64 \
            2>&1 | tail -50

          echo ""
          find . -name "bootstrap-*.zip" -type f 2>/dev/null
          ls -lh bootstrap-*.zip 2>/dev/null || echo "  未找到 bootstrap zip"
          echo ""
          echo "✅ 构建流程完成！"
          SCRIPT_EOF

          chmod +x termux-packages/ci-build.sh
          echo "✅ ci-build.sh 已生成 (v5)"
          echo ""
          echo "=== v5 关键变更 ==="
          echo "1. cp -a 整个 SDK 到 /tmp/android-sdk (可写副本)"
          echo "2. curl 手动下载 build-tools + platform"
          echo "3. 手动创建 source.properties + licenses"
          echo "4. ~/.gradle/gradle.properties 写入 sdk.dir 确保 Gradle 能找到"
          echo "5. 保留 v3/v4 所有修复"

      # ── Phase 5: Docker 构建 ─────────────────────────────────
      - name: "🐳 Docker 构建 (run-docker.sh)"
        working-directory: termux-packages
        env:
          EXTRA_PACKAGES: ${{ env.EXTRA_PACKAGES }}
        run: |
          echo "=== 启动 Docker 构建 ==="
          echo "  包名: ${PACKAGE_NAME}"
          echo "  架构: aarch64"
          echo "  额外包: ${EXTRA_PACKAGES:-无}"
          echo ""

          bash scripts/run-docker.sh bash ci-build.sh

      # ── Phase 6: 收集产物 ─────────────────────────────────────
      - name: "📦 收集构建产物"
        if: always()
        run: |
          echo "=== 查找 bootstrap zip ==="
          find termux-packages -name "bootstrap-*.zip" -type f 2>/dev/null

          BOOTSTRAP=$(find termux-packages -name "bootstrap-aarch64.zip" -type f 2>/dev/null | head -1)
          if [ -n "$BOOTSTRAP" ]; then
            echo "✅ 找到: $BOOTSTRAP"
            ls -lh "$BOOTSTRAP"
            cp "$BOOTSTRAP" ./bootstrap-aarch64.zip
          else
            echo "⚠️ 未找到 bootstrap-aarch64.zip"
            ls -la termux-packages/
            find termux-packages -name "*.zip" -type f 2>/dev/null
          fi

      - name: "⬆️  上传 Artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-bootstrap-${{ env.PACKAGE_NAME }}-aarch64
          path: |
            bootstrap-aarch64.zip
            termux-packages/output/*.deb
          if-no-files-found: warn
          retention-days: 30
