name: Build Termux Bootstrap

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: '自定义包名 (e.g. com.mytermux)'
        required: false
        default: 'com.mytermux'
      packages:
        description: '额外软件包（逗号分隔, e.g. vim,curl,openssh）。留空 = 仅 bootstrap 基础包集'
        required: false
        default: ''
      termux_packages_ref:
        description: 'termux-packages 分支或 tag'
        required: false
        default: 'master'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    env:
      PACKAGE_NAME: ${{ inputs.package_name || 'com.mytermux' }}
      EXTRA_PACKAGES: ${{ inputs.packages || '' }}
      TERMUX_PACKAGES_REF: ${{ inputs.termux_packages_ref || 'master' }}
      TARGET_ARCH: 'aarch64'

    steps:
      # ============================================================
      #  Phase 1: 系统准备
      # ============================================================
      - name: "🧹 释放磁盘空间"
        run: |
          echo "==> 清理前:"
          df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/local/share/boost \
            /usr/share/swift \
            /usr/local/graalvm \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/julia* \
            /opt/hostedtoolcache/CodeQL || true
          sudo apt-get clean || true
          docker image prune -af || true
          echo "==> 清理后:"
          df -h /

      - name: "📥 克隆 termux-packages"
        run: |
          git clone --depth=1 --branch="${TERMUX_PACKAGES_REF}" \
            https://github.com/termux/termux-packages.git
          echo "==> 克隆完成 (ref: ${TERMUX_PACKAGES_REF})"

      - name: "🔍 检查仓库结构"
        run: |
          echo "==> 关键文件:"
          for f in scripts/run-docker.sh scripts/properties.sh build-package.sh scripts/generate-bootstraps.sh; do
            [ -f "termux-packages/$f" ] && echo "  ✅ $f" || { echo "  ❌ $f 不存在！"; exit 1; }
          done
          echo ""
          echo "==> properties.sh 中包名相关变量:"
          grep -n "com\.termux" termux-packages/scripts/properties.sh | head -5

      # ============================================================
      #  Phase 2: 配置自定义包名
      #
      #  ⚠️  关键: sed 中 '.' 是正则通配符, 必须转义为 '\.'
      #  否则 'com.termux' 会匹配 'com/termux', 破坏 URL:
      #    github.com/termux → github.com.agent.skillplatform ❌
      #
      #  正确: sed 's|com\.termux|com.newpkg|g' — 仅匹配字面量点号
      # ============================================================
      - name: "✏️  修改 properties.sh — 注入自定义包名"
        run: |
          PROPS="termux-packages/scripts/properties.sh"
          OLD_PKG="com.termux"
          NEW_PKG="${PACKAGE_NAME}"

          if [ "${OLD_PKG}" = "${NEW_PKG}" ]; then
            echo "⚠️  包名与默认相同，跳过修改"
            exit 0
          fi

          echo "==> 替换: '${OLD_PKG}' → '${NEW_PKG}'"

          # 转义 . 为 \. 确保只匹配字面量点号, 不匹配 com/termux 等
          OLD_PKG_ESCAPED=$(echo "${OLD_PKG}" | sed 's/\./\\./g')
          echo "    sed 模式: s|${OLD_PKG_ESCAPED}|${NEW_PKG}|g"

          sed -i "s|${OLD_PKG_ESCAPED}|${NEW_PKG}|g" "$PROPS"

          echo ""
          echo "==> 校验替换结果:"
          # 确认旧包名已无残留（仅匹配字面量）
          REMAINING=$(grep -cF "${OLD_PKG}" "$PROPS" || true)
          if [ "$REMAINING" -gt 0 ]; then
            echo "⚠️  仍有 ${REMAINING} 处 '${OLD_PKG}' 未替换:"
            grep -nF "${OLD_PKG}" "$PROPS" | head -10
          else
            echo "✅ 校验通过: 无残留旧包名"
          fi

          # 确认 URL 没有被误伤
          BROKEN_URLS=$(grep -c "github\.com\.${NEW_PKG}" "$PROPS" || true)
          if [ "$BROKEN_URLS" -gt 0 ]; then
            echo "❌ 检测到 URL 被误替换！"
            grep -n "github\.com\." "$PROPS" | head -5
            exit 1
          else
            echo "✅ URL 完整性校验通过"
          fi

          echo ""
          echo "==> 修改后包名相关行:"
          grep -n "${NEW_PKG}" "$PROPS" | head -10

      # ============================================================
      #  Phase 3: 补丁 generate-bootstraps.sh
      #
      #  修复: add_termux_bootstrap_second_stage_files() 写入
      #  profile.d 目录前未 mkdir -p, 导致自定义包名时路径不存在。
      # ============================================================
      - name: "🩹 补丁 generate-bootstraps.sh — 修复 mkdir 缺失"
        run: |
          GEN_SCRIPT="termux-packages/scripts/generate-bootstraps.sh"

          echo "==> 在 add_termux_bootstrap_second_stage_files() 中注入 mkdir -p"

          # 在写入 profile.d fallback 文件前, 确保目录存在
          sed -i '/# TODO: Remove it when Termux app supports/i\\tmkdir -p "${BOOTSTRAP_ROOTFS}/${TERMUX__PREFIX__PROFILE_D_DIR}"' "$GEN_SCRIPT"

          echo "==> 验证补丁:"
          grep -n "mkdir.*PROFILE_D_DIR\|mkdir.*BOOTSTRAP_SECOND_STAGE" "$GEN_SCRIPT" || echo "⚠️ 未找到 mkdir 行"

      # ============================================================
      #  Phase 4: 生成容器内构建脚本
      #
      #  核心策略（自定义包名）:
      #    1. 修复 Android SDK (termux-am Gradle 构建所需)
      #    2. 用 build-package.sh 从源码编译全部 bootstrap 包
      #    3. 用编译产物搭建本地 apt 仓库
      #    4. generate-bootstraps.sh --repository file:///...
      #
      #  ⚠️ 关键修复:
      #    - bzip2/curl/xz-utils 是子包, 需构建父包 libbz2/libcurl/liblzma
      #    - termux-am 的 Gradle 需要 platforms;android-33 + build-tools;30.0.3
      #    - sed 正则需转义 . 避免破坏 URL
      # ============================================================
      - name: "📝 生成容器内构建脚本"
        run: |
          cat > termux-packages/ci-build.sh << 'BUILDSCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail

          echo "==========================================="
          echo " Termux Bootstrap CI Build (Source Build)"
          echo "==========================================="
          echo " Date:         $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo " Architecture: ${CI_TARGET_ARCH}"
          echo " Extra Pkgs:   ${CI_EXTRA_PACKAGES:-none}"
          echo " PWD:          $(pwd)"
          echo " User:         $(whoami) (UID=$(id -u))"
          echo ""
          echo " properties.sh 包名相关变量:"
          grep -E "^[^#]*TERMUX_APP|^[^#]*TERMUX_BASE_DIR|^[^#]*TERMUX_HOME|^[^#]*TERMUX_PREFIX" scripts/properties.sh | head -5 || true
          echo "==========================================="
          echo ""

          # ----------------------------------------------------------
          # Step 0: 修复 Android SDK 权限 & 安装缺失组件
          #
          # termux-am 构建需要 Gradle + Android SDK:
          #   - compileSdkVersion 33 → platforms;android-33
          #   - AGP 7.4.2           → build-tools;30.0.3
          # Docker 镜像可能未预装这些版本, 且 SDK 目录可能不可写。
          # ----------------------------------------------------------
          echo "==> [Step 0] 修复 Android SDK..."
          ANDROID_SDK_DIR=$(find /home/builder/lib -maxdepth 1 -name "android-sdk-*" -type d 2>/dev/null | head -1)

          if [ -n "$ANDROID_SDK_DIR" ]; then
            echo "    SDK 目录: $ANDROID_SDK_DIR"

            # 确保 SDK 目录可写 (修复 "Failed to read or create install properties file")
            chmod -R u+w "$ANDROID_SDK_DIR" 2>/dev/null || true

            # 查找 sdkmanager
            SDKMANAGER=""
            for candidate in \
              "$ANDROID_SDK_DIR/cmdline-tools/latest/bin/sdkmanager" \
              "$ANDROID_SDK_DIR/cmdline-tools/bin/sdkmanager" \
              "$ANDROID_SDK_DIR/tools/bin/sdkmanager"; do
              if [ -x "$candidate" ]; then
                SDKMANAGER="$candidate"
                break
              fi
            done

            if [ -n "$SDKMANAGER" ]; then
              echo "    sdkmanager: $SDKMANAGER"

              # 接受所有 licenses
              yes 2>/dev/null | "$SDKMANAGER" --licenses 2>&1 | tail -5 || true

              # 安装缺失的 SDK 组件
              echo "    安装 platforms;android-33 和 build-tools;30.0.3..."
              "$SDKMANAGER" "platforms;android-33" "build-tools;30.0.3" 2>&1 | tail -10 || true

              echo "    已安装的 platforms:"
              ls "$ANDROID_SDK_DIR/platforms/" 2>/dev/null || echo "      (无)"
              echo "    已安装的 build-tools:"
              ls "$ANDROID_SDK_DIR/build-tools/" 2>/dev/null || echo "      (无)"
            else
              echo "    ⚠️  未找到 sdkmanager, 尝试手动查找..."
              find "$ANDROID_SDK_DIR" -name "sdkmanager" -type f 2>/dev/null | head -3
              echo "    将依赖 Gradle 自动安装 SDK 组件"
            fi
          else
            echo "    ⚠️  未找到 Android SDK 目录"
          fi

          echo ""

          # ----------------------------------------------------------
          # Bootstrap 构建包列表
          #
          # ⚠️ 关键映射: 某些 apt 二进制包名 ≠ build-package.sh 源包名
          #
          # apt 包名       → 源包目录名 (build-package.sh 的参数)
          # bzip2          → libbz2    (bzip2 是 libbz2 的子包)
          # curl           → libcurl   (curl 是 libcurl 的子包)
          # xz-utils       → liblzma   (xz-utils 是 liblzma 的子包)
          #
          # 构建父包时自动产出子包 .deb, generate-bootstraps.sh
          # 从本地仓库按 apt 包名拉取, 因此只需构建父包即可。
          # ----------------------------------------------------------
          BUILD_PACKAGES=(
            apt
            bash
            libbz2
            command-not-found
            coreutils
            libcurl
            dash
            diffutils
            findutils
            gawk
            grep
            gzip
            less
            procps
            psmisc
            sed
            tar
            termux-core
            termux-exec
            termux-keyring
            termux-tools
            util-linux
            liblzma
            ed
            debianutils
            dos2unix
            inetutils
            lsof
            nano
            net-tools
            patch
            unzip
          )

          # ----------------------------------------------------------
          # Step 1: 从源码构建所有 bootstrap 包
          # ----------------------------------------------------------
          echo "==> [Step 1] 从源码构建 bootstrap 包..."
          echo "    共 ${#BUILD_PACKAGES[@]} 个构建目标"

          FAILED_PACKAGES=()
          BUILT_COUNT=0
          TOTAL=${#BUILD_PACKAGES[@]}

          for pkg in "${BUILD_PACKAGES[@]}"; do
            IDX=$((BUILT_COUNT + ${#FAILED_PACKAGES[@]} + 1))
            echo ""
            echo ">>> [${IDX}/${TOTAL}] 构建: ${pkg} (${CI_TARGET_ARCH})"
            if bash build-package.sh -a "${CI_TARGET_ARCH}" "${pkg}"; then
              BUILT_COUNT=$((BUILT_COUNT + 1))
              echo "✅ 构建成功: ${pkg} (已完成 ${BUILT_COUNT}/${TOTAL})"
            else
              echo "⚠️  构建失败: ${pkg}, 继续下一个..."
              FAILED_PACKAGES+=("${pkg}")
            fi
          done

          echo ""
          echo "==> 基础包构建完成: ${BUILT_COUNT}/${TOTAL} 成功"
          if [ ${#FAILED_PACKAGES[@]} -gt 0 ]; then
            echo "⚠️  失败的包: ${FAILED_PACKAGES[*]}"
          fi

          # ----------------------------------------------------------
          # Step 1.5: 构建额外软件包（如有）
          # ----------------------------------------------------------
          if [ -n "${CI_EXTRA_PACKAGES:-}" ]; then
            echo ""
            echo "==> [Step 1.5] 构建额外软件包..."
            IFS=',' read -ra EXTRA_ARRAY <<< "${CI_EXTRA_PACKAGES}"
            for pkg in "${EXTRA_ARRAY[@]}"; do
              pkg=$(echo "${pkg}" | xargs)
              [ -z "$pkg" ] && continue
              echo ""
              echo ">>> 构建额外包: ${pkg} (${CI_TARGET_ARCH})"
              if bash build-package.sh -a "${CI_TARGET_ARCH}" "${pkg}"; then
                echo "✅ 构建成功: ${pkg}"
              else
                echo "⚠️  构建失败: ${pkg}"
                FAILED_PACKAGES+=("${pkg}")
              fi
            done
          else
            echo "==> [Step 1.5] 无额外软件包，跳过"
          fi

          # ----------------------------------------------------------
          # Step 2: 搭建本地 apt 仓库
          # ----------------------------------------------------------
          echo ""
          echo "==> [Step 2] 搭建本地 apt 仓库..."

          LOCAL_REPO="/tmp/local-repo"
          REPO_DIST="${LOCAL_REPO}/dists/stable/main/binary-${CI_TARGET_ARCH}"
          REPO_DIST_ALL="${LOCAL_REPO}/dists/stable/main/binary-all"

          mkdir -p "${LOCAL_REPO}" "${REPO_DIST}" "${REPO_DIST_ALL}"

          # 定位 .deb 文件输出目录
          DEB_SOURCE=""
          if [ -d "output" ] && ls output/*.deb 1>/dev/null 2>&1; then
            DEB_SOURCE="output"
          elif [ -d "debs" ] && ls debs/*.deb 1>/dev/null 2>&1; then
            DEB_SOURCE="debs"
          else
            echo "    搜索 .deb 文件..."
            DEB_SOURCE=$(find . -maxdepth 2 -name "*.deb" -type f -print -quit | xargs -r dirname)
          fi

          if [ -z "${DEB_SOURCE}" ]; then
            echo "❌ 未找到任何 .deb 文件！"
            ls -la output/ 2>/dev/null || true
            ls -la debs/ 2>/dev/null || true
            exit 1
          fi

          echo "    .deb 来源目录: ${DEB_SOURCE}"
          DEB_COUNT=$(find "${DEB_SOURCE}" -name "*.deb" -type f | wc -l)
          echo "    找到 ${DEB_COUNT} 个 .deb 文件"

          # 列出关键包的 .deb 是否存在 (用于调试)
          echo ""
          echo "    关键 bootstrap 包检查:"
          for check_pkg in apt bash bzip2 curl xz-utils termux-core termux-tools termux-am; do
            FOUND=$(find "${DEB_SOURCE}" -name "${check_pkg}_*.deb" -type f 2>/dev/null | head -1)
            if [ -n "$FOUND" ]; then
              echo "      ✅ ${check_pkg}: $(basename "$FOUND")"
            else
              echo "      ❌ ${check_pkg}: 未找到 .deb"
            fi
          done
          echo ""

          # 复制所有 .deb 到仓库根目录
          find "${DEB_SOURCE}" -name "*.deb" -type f -exec cp {} "${LOCAL_REPO}/" \;

          # 生成 Packages 索引
          echo "    生成 Packages 索引..."
          cd "${LOCAL_REPO}"

          python3 - "${CI_TARGET_ARCH}" << 'PYEOF'
          import os, sys, subprocess, hashlib, email.parser

          arch = sys.argv[1]
          repo_root = os.getcwd()

          deb_files = [f for f in os.listdir(repo_root) if f.endswith('.deb')]
          print(f"    处理 {len(deb_files)} 个 .deb 文件...")

          entries_arch = []
          entries_all = []

          for deb in sorted(deb_files):
              deb_path = os.path.join(repo_root, deb)
              size = os.path.getsize(deb_path)

              md5 = hashlib.md5()
              sha256 = hashlib.sha256()
              with open(deb_path, 'rb') as f:
                  for chunk in iter(lambda: f.read(8192), b''):
                      md5.update(chunk)
                      sha256.update(chunk)

              try:
                  result = subprocess.run(
                      ['dpkg-deb', '--field', deb_path],
                      capture_output=True, text=True, timeout=30
                  )
                  if result.returncode != 0:
                      print(f"    ⚠️  跳过 {deb}: dpkg-deb 失败")
                      continue
                  control = result.stdout.strip()
              except Exception as e:
                  print(f"    ⚠️  跳过 {deb}: {e}")
                  continue

              parser = email.parser.Parser()
              msg = parser.parsestr(control)
              pkg_arch = msg.get('Architecture', 'all').strip()

              entry = control + "\n"
              entry += f"Filename: {deb}\n"
              entry += f"Size: {size}\n"
              entry += f"MD5sum: {md5.hexdigest()}\n"
              entry += f"SHA256: {sha256.hexdigest()}\n"

              if pkg_arch == 'all':
                  entries_all.append(entry)
              else:
                  entries_arch.append(entry)

          dist_arch = f"dists/stable/main/binary-{arch}"
          dist_all = "dists/stable/main/binary-all"

          with open(os.path.join(dist_arch, "Packages"), 'w') as f:
              f.write("\n".join(entries_arch) + "\n")
          print(f"    写入 {dist_arch}/Packages ({len(entries_arch)} 条)")

          with open(os.path.join(dist_all, "Packages"), 'w') as f:
              f.write("\n".join(entries_all) + "\n")
          print(f"    写入 {dist_all}/Packages ({len(entries_all)} 条)")
          PYEOF

          cd "${OLDPWD}"

          echo "    ✅ 本地仓库就绪: ${LOCAL_REPO}"

          # ----------------------------------------------------------
          # Step 3: 用 generate-bootstraps.sh 组装 bootstrap
          # ----------------------------------------------------------
          echo ""
          echo "==> [Step 3] 生成 bootstrap-${CI_TARGET_ARCH}.zip ..."
          echo "    使用本地仓库: file://${LOCAL_REPO}"

          bash scripts/generate-bootstraps.sh \
            --repository "file://${LOCAL_REPO}" \
            --architectures "${CI_TARGET_ARCH}"

          # ----------------------------------------------------------
          # Step 4: 校验产物
          # ----------------------------------------------------------
          echo ""
          echo "==> [Step 4] 检查构建产物..."
          find . -name "bootstrap-*.zip" -type f 2>/dev/null | while read -r f; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            echo "    📦 ${f} ($(du -h "$f" | cut -f1), ${SIZE} bytes)"
            if [ "$SIZE" -lt 1048576 ]; then
              echo "    ⚠️  文件过小，可能不完整"
            fi
          done

          ZIP_COUNT=$(find . -name "bootstrap-*.zip" -type f 2>/dev/null | wc -l)
          if [ "$ZIP_COUNT" -eq 0 ]; then
            echo "❌ 未找到 bootstrap-*.zip！"
            exit 1
          fi

          if [ ${#FAILED_PACKAGES[@]} -gt 0 ]; then
            echo ""
            echo "⚠️  注意: 以下包构建失败, bootstrap 可能不完整:"
            echo "    ${FAILED_PACKAGES[*]}"
          fi

          echo ""
          echo "✅ Bootstrap 构建完成！"
          BUILDSCRIPT

          # 注入变量到脚本头部
          sed -i "2i export CI_TARGET_ARCH=\"${TARGET_ARCH}\"" termux-packages/ci-build.sh
          sed -i "3i export CI_EXTRA_PACKAGES=\"${EXTRA_PACKAGES}\"" termux-packages/ci-build.sh

          echo "==> ci-build.sh 前 6 行:"
          head -6 termux-packages/ci-build.sh

      # ============================================================
      #  Phase 5: 执行构建
      # ============================================================
      - name: "🔨 在 Docker 中执行构建"
        working-directory: termux-packages
        run: |
          echo "==> 当前磁盘:"
          df -h /
          echo ""
          echo "==> 启动构建（通过 run-docker.sh）..."
          echo "    ⏱  预计耗时: 2-4 小时（从源码编译 ~30 个包）"
          ./scripts/run-docker.sh bash ci-build.sh

      # ============================================================
      #  Phase 6: 收集产物
      # ============================================================
      - name: "📦 收集构建产物"
        if: always()
        run: |
          mkdir -p output

          echo "==> 搜索 bootstrap zip..."
          find termux-packages -name "bootstrap-*.zip" -type f 2>/dev/null | while read -r f; do
            cp "$f" output/
            echo "  ✅ $(basename "$f") → output/"
          done

          FOUND=$(ls output/bootstrap-*.zip 2>/dev/null | wc -l || echo 0)
          if [ "$FOUND" -eq 0 ]; then
            echo "⚠️  未找到 bootstrap zip，收集调试信息..."
            find termux-packages -name "*.zip" -type f 2>/dev/null | head -20 > output/DEBUG_zip_files.txt || true
            find termux-packages -name "*.deb" -type f 2>/dev/null | head -50 > output/DEBUG_deb_files.txt || true
            cp termux-packages/scripts/properties.sh output/DEBUG_properties.sh 2>/dev/null || true
          fi

          {
            echo "Build Date:          $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "Package Name:        ${PACKAGE_NAME}"
            echo "Target Architecture: ${TARGET_ARCH}"
            echo "Extra Packages:      ${EXTRA_PACKAGES:-none}"
            echo "termux-packages ref: ${TERMUX_PACKAGES_REF}"
            echo "Bootstrap files:     ${FOUND}"
          } > output/BUILD_INFO.txt

          echo ""
          echo "==> output/ 内容:"
          ls -lh output/

          if ls output/bootstrap-*.zip 1>/dev/null 2>&1; then
            echo ""
            echo "==> SHA256:"
            cd output && sha256sum bootstrap-*.zip | tee SHA256SUMS.txt
          fi

      - name: "⬆️  上传构建产物"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: termux-bootstrap-${{ env.TARGET_ARCH }}-run${{ github.run_number }}
          path: output/
          retention-days: 90
          if-no-files-found: warn
